name: Publish library on Release

on:
  workflow_call:
    secrets:
      GH_PACKAGES_TOKEN:
        required: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Publish to GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || github.token }}
        run: |
          set +e
          ./gradlew publish --no-daemon --build-cache 2>&1 | tee publish.log
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ] && grep -q "status code 409" publish.log; then
            echo "Maven artifact already published (main CI) — treating as success."
            exit 0
          fi
          exit "$code"
