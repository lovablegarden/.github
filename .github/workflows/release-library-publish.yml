name: Publish library on Release

on:
  workflow_call:
    inputs:
      maven_package_names:
        description: 'Comma-separated Maven package names to prune after publish'
        required: false
        type: string
        default: ''
      version:
        description: 'Release version to protect from pruning (e.g. v1.2.3)'
        required: false
        type: string
        default: ''
      prune_dry_run:
        description: 'When true, package retention only logs deletions'
        required: false
        type: boolean
        default: false
    secrets:
      GH_PACKAGES_TOKEN:
        required: false
      LOVABLEGARDEN_BOT_PRIVATE_KEY:
        required: false
      LOVABLEGARDEN_BOT_APP_ID:
        required: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Publish to GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || github.token }}
        run: |
          set +e
          ./gradlew publish --no-daemon --build-cache 2>&1 | tee publish.log
          code=${PIPESTATUS[0]}
          if [ "$code" -ne 0 ] && grep -q "status code 409" publish.log; then
            echo "Maven artifact already published (main CI) — treating as success."
            exit 0
          fi
          exit "$code"

  prune-maven:
    needs: [publish]
    if: inputs.maven_package_names != '' && secrets.LOVABLEGARDEN_BOT_PRIVATE_KEY != ''
    strategy:
      fail-fast: false
      matrix:
        package_name: ${{ fromJSON(format('["{0}"]', join(split(inputs.maven_package_names, ','), '","'))) }}
    permissions:
      packages: write
    uses: lovablegarden/.github/.github/workflows/prune-maven-package.yml@main
    with:
      package_name: ${{ matrix.package_name }}
      protect_versions: ${{ inputs.version }}
      dry_run: ${{ inputs.prune_dry_run }}
    secrets:
      LOVABLEGARDEN_BOT_APP_ID: ${{ secrets.LOVABLEGARDEN_BOT_APP_ID }}
      LOVABLEGARDEN_BOT_PRIVATE_KEY: ${{ secrets.LOVABLEGARDEN_BOT_PRIVATE_KEY }}
