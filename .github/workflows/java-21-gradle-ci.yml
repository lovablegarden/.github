name: CI Template

on:
  workflow_call:
    secrets:
      GH_PACKAGES_TOKEN:
        description: 'GitHub Packages token for accessing private packages'
        required: false
  
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Application
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
  
      - name: Debug GitHub Packages access
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GH_PACKAGE_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || github.token }}
        run: |
          echo "=== GitHub Environment Debug ==="
          echo "GitHub Actor: $GITHUB_ACTOR"
          echo "GitHub Token: ${GH_PACKAGE_TOKEN:0:10}..."
          echo "Repository: ${{ github.repository }}"
          echo ""
          echo "=== Testing GitHub Packages Access ==="
          curl -H "Authorization: token $GH_PACKAGE_TOKEN" -H "Accept: application/vnd.github.v3+json" \
               "https://api.github.com/orgs/gardentalkz/packages/maven/se.gardentalkz.api.gardentalkz-api-auth/versions" \
               || echo "Failed to access package versions"
          echo ""
          echo "=== Testing Maven Repository Access ==="
          curl -H "Authorization: token $GH_PACKAGE_TOKEN" \
               "https://maven.pkg.github.com/gardentalkz/gardentalkz-openapi-spec/se/gardentalkz/api/gardentalkz-api-auth/1.0.0/gardentalkz-api-auth-1.0.0.pom" \
               || echo "Failed to access Maven artifact"
  
      - name: Build with Gradle
        env:
          CI: true
          GITHUB_ACTOR: ${{ github.actor }}
          GH_PACKAGE_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || github.token }}
        run: ./gradlew build --no-daemon --stacktrace

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar

  publish:
    runs-on: ubuntu-latest
    name: Publish Docker Image
    needs: [build]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: build/libs

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
  
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PACKAGES_TOKEN || github.token }}

      - name: Read project version
        id: project_version
        run: |
          if [ -f gradle.properties ] && grep -q '^version=' gradle.properties; then
            VERSION=$(grep '^version=' gradle.properties | head -1 | cut -d= -f2 | tr -d '[:space:]')
          elif [ -f build.gradle ] && grep -q "version\s*=" build.gradle; then
            VERSION=$(grep "version\s*=" build.gradle | head -1 | sed -E "s/.*['\"]([^'\"]+)['\"].*/\1/")
          else
            VERSION=1.0.0-SNAPSHOT
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing Docker tag: $VERSION"
  
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
          tags: |
            type=raw,value=${{ steps.project_version.outputs.version }}
            type=raw,value=latest
            type=sha,prefix={{branch}}-
  
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GITHUB_ACTOR=${{ github.actor }}
            GH_PACKAGE_TOKEN=${{ secrets.GH_PACKAGES_TOKEN || github.token }}
