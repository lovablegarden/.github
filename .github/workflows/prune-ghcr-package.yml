name: Prune GHCR package

on:
  workflow_call:
    inputs:
      image_name:
        description: 'GHCR package name (e.g. lovablegarden-plants)'
        required: true
        type: string
      keep_count:
        description: 'Number of semver release tags to keep'
        required: false
        type: number
        default: 3
      dry_run:
        description: 'Log deletions without executing'
        required: false
        type: boolean
        default: true
      protect_versions:
        description: 'Comma-separated extra tags to never delete (e.g. current release)'
        required: false
        type: string
        default: ''
    secrets:
      LOVABLEGARDEN_BOT_PRIVATE_KEY:
        required: true
      LOVABLEGARDEN_BOT_APP_ID:
        required: false
  workflow_dispatch:
    inputs:
      image_name:
        description: 'GHCR package name (e.g. lovablegarden-plants)'
        required: true
        type: string
      keep_count:
        description: 'Number of semver release tags to keep'
        required: false
        type: number
        default: 3
      dry_run:
        description: 'Log deletions without executing'
        required: true
        type: boolean
        default: true
      protect_versions:
        description: 'Comma-separated extra tags to never delete'
        required: false
        type: string
        default: ''

permissions:
  packages: write

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.LOVABLEGARDEN_BOT_APP_ID || secrets.LOVABLEGARDEN_BOT_APP_ID }}
          private-key: ${{ secrets.LOVABLEGARDEN_BOT_PRIVATE_KEY }}
          owner: lovablegarden

      - name: Checkout lovablegarden-system (prod lock pins)
        uses: actions/checkout@v4
        with:
          repository: lovablegarden/lovablegarden-system
          ref: main
          token: ${{ steps.app-token.outputs.token }}
          path: system
          sparse-checkout: |
            versions/services.lock.prod.yml

      - name: Build protected tag list
        id: protect
        run: |
          IMAGE="${{ inputs.image_name }}"
          SKIP="latest"

          if [ -f system/versions/services.lock.prod.yml ]; then
            PIN=$(grep -E "^  ${IMAGE}:" system/versions/services.lock.prod.yml | awk '{print $2}' | tr -d '[:space:]' || true)
            if [ -n "$PIN" ]; then
              SKIP="${SKIP},${PIN}"
              echo "Prod lock pin for ${IMAGE}: ${PIN}"
            fi
          fi

          EXTRA="${{ inputs.protect_versions }}"
          if [ -n "$EXTRA" ]; then
            SKIP="${SKIP},${EXTRA}"
          fi

          echo "skip-tags=${SKIP}" >> "$GITHUB_OUTPUT"
          echo "Protected tags: ${SKIP}"

      - name: Prune old GHCR versions
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          IMAGE_NAME: ${{ inputs.image_name }}
          KEEP_COUNT: ${{ inputs.keep_count }}
          DRY_RUN: ${{ inputs.dry_run }}
          PROTECT_TAGS: ${{ steps.protect.outputs.skip-tags }}
        run: |
          set -euo pipefail

          PAGE=1
          ALL='[]'
          while true; do
            RESP=$(gh api \
              -H "Accept: application/vnd.github+json" \
              "/orgs/lovablegarden/packages/container/${IMAGE_NAME}/versions?per_page=100&page=${PAGE}")
            COUNT=$(echo "$RESP" | jq 'length')
            ALL=$(echo "$ALL $RESP" | jq -s 'add')
            if [ "$COUNT" -lt 100 ]; then
              break
            fi
            PAGE=$((PAGE + 1))
          done

          TOTAL=$(echo "$ALL" | jq 'length')
          echo "Found ${TOTAL} version(s) for ${IMAGE_NAME}"
          export VERSIONS_JSON="$ALL"

          python3 <<'PY'
          import json, os, re, subprocess

          image = os.environ["IMAGE_NAME"]
          keep_count = int(os.environ["KEEP_COUNT"])
          dry_run = os.environ["DRY_RUN"].lower() == "true"
          protect = {t.strip().lstrip("v") for t in os.environ["PROTECT_TAGS"].split(",") if t.strip()}

          versions = json.loads(os.environ["VERSIONS_JSON"])
          semver_re = re.compile(r"^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$")

          def tags_for(v):
              tags = v.get("metadata", {}).get("container", {}).get("tags")
              if tags is None:
                  tags = v.get("name") or []
              return [str(t) for t in tags]

          semver_rank = {}
          for v in versions:
              for tag in tags_for(v):
                  if semver_re.match(tag):
                      semver_rank[tag] = max(semver_rank.get(tag, ""), v["created_at"])

          keep_semver = {t for t, _ in sorted(semver_rank.items(), key=lambda x: x[1], reverse=True)[:keep_count]}
          keep_tags = keep_semver | protect
          print(f"Keep semver tags: {sorted(keep_semver)}")
          print(f"Protected tags: {sorted(protect)}")

          to_delete = []
          for v in versions:
              vid = v["id"]
              tags = tags_for(v)
              if not tags:
                  print(f"KEEP  untagged ({vid})")
                  continue
              if "latest" in tags or any(t in protect for t in tags):
                  print(f"KEEP  {tags} ({vid}) protected")
                  continue
              semver_tags = [t for t in tags if semver_re.match(t)]
              if semver_tags and all(t in keep_tags for t in semver_tags):
                  print(f"KEEP  {tags} ({vid})")
                  continue
              if semver_tags and any(t not in keep_tags for t in semver_tags):
                  print(f"DELETE {tags} ({vid})")
                  to_delete.append(vid)
                  continue
              if not semver_tags:
                  print(f"DELETE {tags} ({vid}) branch-only")
                  to_delete.append(vid)
                  continue
              print(f"KEEP  {tags} ({vid})")

          print(f"Versions to delete: {len(to_delete)}")
          if not to_delete:
              raise SystemExit(0)
          if dry_run:
              print("dry_run=true — no versions deleted")
              raise SystemExit(0)

          for vid in to_delete:
              print(f"Deleting version id {vid}...")
              subprocess.check_call([
                  "gh", "api", "--method", "DELETE",
                  "-H", "Accept: application/vnd.github+json",
                  f"/orgs/lovablegarden/packages/container/{image}/versions/{vid}",
              ])
          PY
