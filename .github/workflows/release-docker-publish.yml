name: Publish Docker on Release

on:
  workflow_call:
    inputs:
      version:
        description: 'Release tag or version (e.g. v1.2.3 or 1.2.3)'
        required: true
        type: string
      prune_dry_run:
        description: 'When true, package retention only logs deletions'
        required: false
        type: boolean
        default: false
    secrets:
      GH_PACKAGES_TOKEN:
        description: 'GitHub Packages token'
        required: false
      LOVABLEGARDEN_BOT_PRIVATE_KEY:
        required: false
      LOVABLEGARDEN_BOT_APP_ID:
        required: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Normalize version
        id: version
        run: |
          RAW="${{ inputs.version }}"
          VERSION=$(echo "$RAW" | sed 's/^v//' | grep -oE '[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?' | tail -1)
          if [ -z "$VERSION" ]; then
            echo "Could not parse semver from: $RAW"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Docker release tag: $VERSION (from $RAW)"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Wait for lovablegarden-bom (if configured)
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GH_PACKAGE_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || github.token }}
        run: |
          if [ ! -f gradle.properties ] || ! grep -q '^lovablegardenBomVersion=' gradle.properties; then
            echo "No lovablegardenBomVersion in gradle.properties — skipping BOM wait"
            exit 0
          fi
          BOM_VERSION=$(grep '^lovablegardenBomVersion=' gradle.properties | head -1 | cut -d= -f2 | tr -d '[:space:]')
          POM_URL="https://maven.pkg.github.com/lovablegarden/lovablegarden-security-common/com/lovablegarden/lovablegarden-bom/${BOM_VERSION}/lovablegarden-bom-${BOM_VERSION}.pom"
          for attempt in $(seq 1 36); do
            if curl -fsSL -u "${GITHUB_ACTOR}:${GH_PACKAGE_TOKEN}" "$POM_URL" >/dev/null 2>&1; then
              echo "lovablegarden-bom ${BOM_VERSION} is available"
              exit 0
            fi
            echo "Waiting for lovablegarden-bom ${BOM_VERSION} (attempt ${attempt}/36)..."
            sleep 10
          done
          echo "Timed out waiting for lovablegarden-bom ${BOM_VERSION}"
          exit 1

      - name: Build with Gradle
        env:
          CI: true
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || github.token }}
          GH_PACKAGE_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || github.token }}
        run: ./gradlew build --no-daemon --stacktrace

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PACKAGES_TOKEN || github.token }}

      - name: Build and push release Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          build-args: |
            GITHUB_ACTOR=${{ github.actor }}
            GH_PACKAGE_TOKEN=${{ secrets.GH_PACKAGES_TOKEN || github.token }}

  prune-package:
    needs: [publish]
    permissions:
      packages: write
    uses: lovablegarden/.github/.github/workflows/prune-ghcr-package.yml@main
    with:
      image_name: ${{ github.event.repository.name }}
      protect_versions: ${{ needs.publish.outputs.version }}
      dry_run: ${{ inputs.prune_dry_run }}
    secrets:
      LOVABLEGARDEN_BOT_APP_ID: ${{ secrets.LOVABLEGARDEN_BOT_APP_ID }}
      LOVABLEGARDEN_BOT_PRIVATE_KEY: ${{ secrets.LOVABLEGARDEN_BOT_PRIVATE_KEY }}
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
