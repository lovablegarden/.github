name: Release Please

on:
  workflow_call:
    inputs:
      config-file:
        description: Path to release-please config JSON
        required: false
        default: .github/release-please-config.json
        type: string
      manifest-file:
        description: Path to release-please manifest JSON
        required: false
        default: .github/.release-please-manifest.json
        type: string
    secrets:
      LOVABLEGARDEN_BOT_PRIVATE_KEY:
        required: true
      LOVABLEGARDEN_BOT_APP_ID:
        description: Optional if org variable LOVABLEGARDEN_BOT_APP_ID is set
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.LOVABLEGARDEN_BOT_APP_ID || secrets.LOVABLEGARDEN_BOT_APP_ID }}
          private-key: ${{ secrets.LOVABLEGARDEN_BOT_PRIVATE_KEY }}
          owner: lovablegarden

      - uses: googleapis/release-please-action@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: ${{ inputs.config-file }}
          manifest-file: ${{ inputs.manifest-file }}
