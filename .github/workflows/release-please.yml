name: Release Please

on:
  workflow_call:
    inputs:
      config-file:
        description: Path to release-please config JSON
        required: false
        default: .github/release-please-config.json
        type: string
      manifest-file:
        description: Path to release-please manifest JSON
        required: false
        default: .github/.release-please-manifest.json
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: ${{ inputs.config-file }}
          manifest-file: ${{ inputs.manifest-file }}
