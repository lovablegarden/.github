name: Package retention (scheduled)

on:
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Log deletions without executing'
        required: true
        type: boolean
        default: false

permissions:
  packages: write

jobs:
  load-manifest:
    runs-on: ubuntu-latest
    outputs:
      ghcr_packages: ${{ steps.parse.outputs.ghcr_packages }}
      maven_packages: ${{ steps.parse.outputs.maven_packages }}
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.LOVABLEGARDEN_BOT_APP_ID || secrets.LOVABLEGARDEN_BOT_APP_ID }}
          private-key: ${{ secrets.LOVABLEGARDEN_BOT_PRIVATE_KEY }}
          owner: lovablegarden
          repositories: lovablegarden-system
          permission-packages: write
          permission-contents: read

      - name: Checkout package manifest
        uses: actions/checkout@v4
        with:
          repository: lovablegarden/lovablegarden-system
          ref: main
          token: ${{ steps.app-token.outputs.token }}
          path: system
          sparse-checkout: |
            versions/package-retention.yml

      - name: Parse manifest
        id: parse
        run: |
          pip install --quiet pyyaml
          python3 <<'PY'
          import json, os, yaml
          from pathlib import Path
          data = yaml.safe_load(Path("system/versions/package-retention.yml").read_text())
          ghcr = data.get("ghcr", [])
          maven = data.get("maven", [])
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"ghcr_packages={json.dumps(ghcr)}\n")
              out.write(f"maven_packages={json.dumps(maven)}\n")
          print(f"GHCR packages: {len(ghcr)}")
          print(f"Maven packages: {len(maven)}")
          PY

  trigger-ghcr-retention:
    needs: [load-manifest]
    if: needs.load-manifest.outputs.ghcr_packages != '[]'
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        image_name: ${{ fromJson(needs.load-manifest.outputs.ghcr_packages) }}
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.LOVABLEGARDEN_BOT_APP_ID || secrets.LOVABLEGARDEN_BOT_APP_ID }}
          private-key: ${{ secrets.LOVABLEGARDEN_BOT_PRIVATE_KEY }}
          owner: lovablegarden
          permission-contents: write

      - name: Resolve owning repository
        id: map
        run: |
          case "${{ matrix.image_name }}" in
            supabase-jwt-validator|lovablegarden-system)
              echo "repository=lovablegarden-system" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "repository=${{ matrix.image_name }}" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Dispatch GHCR retention in owning repository
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
        run: |
          gh api --method POST "repos/lovablegarden/${{ steps.map.outputs.repository }}/dispatches" \
            -f event_type=package-retention \
            -f "client_payload[image]=${{ matrix.image_name }}" \
            -f "client_payload[dry_run]=${DRY_RUN}"
          echo "Dispatched package-retention for ${{ matrix.image_name }} -> ${{ steps.map.outputs.repository }}"

  prune-maven:
    needs: [load-manifest]
    if: needs.load-manifest.outputs.maven_packages != '[]'
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        package_name: ${{ fromJson(needs.load-manifest.outputs.maven_packages) }}
    uses: lovablegarden/.github/.github/workflows/prune-maven-package.yml@main
    with:
      package_name: ${{ matrix.package_name }}
      dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
    secrets:
      LOVABLEGARDEN_BOT_APP_ID: ${{ secrets.LOVABLEGARDEN_BOT_APP_ID }}
      LOVABLEGARDEN_BOT_PRIVATE_KEY: ${{ secrets.LOVABLEGARDEN_BOT_PRIVATE_KEY }}
