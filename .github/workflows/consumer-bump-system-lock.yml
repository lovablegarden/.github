name: Bump system lock file

on:
  workflow_call:
    inputs:
      service_key:
        description: 'Lock file service key (e.g. lovablegarden-plants)'
        required: true
        type: string
      service_version:
        description: 'Semver without v prefix'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.LOVABLEGARDEN_BOT_APP_ID }}
          private-key: ${{ secrets.LOVABLEGARDEN_BOT_PRIVATE_KEY }}
          owner: lovablegarden

      - name: Checkout lovablegarden-system
        uses: actions/checkout@v4
        with:
          repository: lovablegarden/lovablegarden-system
          token: ${{ steps.app-token.outputs.token }}
          path: system

      - name: Update production lock files
        working-directory: system
        run: |
          KEY="${{ inputs.service_key }}"
          VERSION="${{ inputs.service_version }}"
          VERSION="${VERSION#v}"
          for LOCK in versions/services.lock.prod.yml versions/services.lock.yml; do
            if ! grep -q "^  ${KEY}:" "$LOCK"; then
              echo "Service key not found in ${LOCK}: ${KEY}"
              exit 1
            fi
            sed -i.bak "s|^  ${KEY}:.*|  ${KEY}: ${VERSION}|" "$LOCK"
            rm -f "${LOCK}.bak"
          done
          git diff -- versions/

      - name: Open PR in lovablegarden-system
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          path: system
          branch: bump/${{ inputs.service_key }}-${{ inputs.service_version }}
          title: "chore: bump ${{ inputs.service_key }} to ${{ inputs.service_version }}"
          body: |
            Automated lock file bump after `${{ inputs.service_key }}` release `${{ inputs.service_version }}`.

            Merge and rebuild `lovablegarden-system` to deploy this version to production.
          commit-message: "chore: bump ${{ inputs.service_key }} to ${{ inputs.service_version }}"
